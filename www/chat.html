<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hybrid P2P Chat - bksysnet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    * { box-sizing: border-box; }
    
    .container div {
        width: 100%;      
        margin: 0;         
        padding: 0;        
        box-shadow: none;  
        background-color: transparent;
    }

    .panel {
        background-color: #fdfdff !important;
        padding: 15px !important;
        border: 1px solid #e0e0e0;
        border-radius: 5px;
        margin-bottom: 15px !important;
    }

    .chat-box { 
        height: 350px; 
        overflow-y: auto; 
        overflow-x: hidden;
        border: 1px solid #ccc; 
        padding: 10px !important; 
        background: #fafafa !important; 
        border-radius: 4px;
        text-align: left; 
    }
    
    .msg { margin: 8px 0; padding: 8px !important; border-radius: 4px; }
    .msg.direct { background-color: #e3f2fd !important; border-left: 4px solid #1976d2; }
    .msg.broadcast { background-color: #f1f8e9 !important; border-left: 4px solid #689f38; }
    
    .btn {
        background-color: #38488f; color: white; border: none; 
        padding: 8px 15px; border-radius: 4px; cursor: pointer; white-space: nowrap;
    }
    .btn:hover { background-color: #2c3a73; }
    .input-field { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 100%; }
    
    .flex-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px !important; }
    .flex-row:last-child { margin-bottom: 0 !important; }
    .flex-grow { flex: 1; }
  </style>
</head>
<body>

  <div class="container" style="max-width: 800px; width: 90%;">
      <h2><span style="color:#d32f2f;">bksysnet@hcmut</span> Hybrid Chat</h2>

      <div id="login-section" class="flex-row" style="justify-content: center; margin-top: 20px !important;">
          <input type="text" id="username" class="input-field flex-grow" style="max-width: 300px;" placeholder="Enter your username...">
          <button class="btn" onclick="login()">Join P2P Network</button>
      </div>

      <div id="chat-section" style="display:none; margin-top: 20px !important;">
          <h3 id="channel-title" style="color: #38488f; margin-bottom: 10px;">Chat Channel: Global</h3>
          
          <div class="panel">
              <div class="flex-row">
                  <strong style="white-space: nowrap; width: 80px; text-align: left;">Create Channel</strong>
                  <input type="text" id="new-channel-name" class="input-field flex-grow" placeholder="Channel name...">
                  <input type="password" id="new-channel-pass" class="input-field flex-grow" placeholder="Password (Optional)">
                  <button class="btn" onclick="createNewChannel()">Create</button>
              </div>
              <div class="flex-row">
                  <strong style="white-space: nowrap; width: 80px; text-align: left;">Join Channel:</strong>
                  <select id="channel-select" class="input-field flex-grow" onchange="handleChannelChange()">
                      <option value="Global">Global</option>
                  </select>
              </div>
          </div>

          <div id="messages" class="chat-box"></div>
          
          <div class="flex-row" style="margin-top: 15px !important;">
              <input type="text" id="chat-input" class="input-field flex-grow" placeholder="Enter message to broadcast...">
              <button class="btn" onclick="sendBroadcast()">Send Message</button>
          </div>
      </div>
  </div>

  <script>
    let myName = "";
    const TRACKER_URL = "http://127.0.0.1:9000";
    let myJoinedChannels = ["Global"]; 
    let allChannelsData = {};
    let currentActiveChannel = "Global";

    async function login() {
        myName = document.getElementById("username").value;
        let currentPort = window.location.port || "8001"; 
        if (!myName) return alert("Please enter your name!");

        try {
            await fetch("/login", { method: "POST", body: JSON.stringify({username: myName}) });
            await fetch(`${TRACKER_URL}/submit-info`, { method: "POST", body: JSON.stringify({username: myName, ip: "127.0.0.1", port: parseInt(currentPort)}) });

            document.getElementById("login-section").style.display = "none";
            document.getElementById("chat-section").style.display = "block";
            
            await updateChannelList();
            setInterval(async () => {
                await updateChannelList();
                await fetchMessages(); 
            }, 3000); 
        } catch (err) {
            alert("Connection error. Please check the Tracker (Port 9000).");
        }
    }

    async function createNewChannel() {
        const name = document.getElementById("new-channel-name").value;
        const pass = document.getElementById("new-channel-pass").value; 
        if (!name) return;
        
        const res = await fetch(`${TRACKER_URL}/add-list`, {
            method: "POST",
            body: JSON.stringify({ channel_name: name, password: pass, creator: myName })
        });
        
        if ((await res.json()).status === "success") {
            myJoinedChannels.push(name); 
            alert(`Channel ${name} created successfully!`);
        }
        
        document.getElementById("new-channel-name").value = "";
        document.getElementById("new-channel-pass").value = "";
        await updateChannelList(); 
    }

    async function updateChannelList() {
        try {
            const res = await fetch(`${TRACKER_URL}/get-list`);
            const data = await res.json();
            allChannelsData = data.channels;
            
            const select = document.getElementById("channel-select");
            select.innerHTML = ""; 
            
            for (let ch in allChannelsData) {
                const opt = document.createElement("option");
                opt.value = ch;
                opt.innerText = allChannelsData[ch].is_private ? `🔒 ${ch}` : ch;
                select.appendChild(opt);
            }
            select.value = currentActiveChannel;
        } catch (error) {}
    }

    async function handleChannelChange() {
        const selected = document.getElementById("channel-select").value;
        
        if (myJoinedChannels.includes(selected)) {
            currentActiveChannel = selected;
            document.getElementById("channel-title").innerText = "Kênh chat: " + selected;
            fetchMessages();
            return;
        }

        let pwd = "";
        if (allChannelsData[selected].is_private) {
            pwd = prompt(`Channel [${selected}] requires Access Control. Please enter the password:`);
            if (pwd === null) {
                document.getElementById("channel-select").value = currentActiveChannel;
                return;
            }
        }

        const res = await fetch(`${TRACKER_URL}/join-channel`, {
            method: "POST",
            body: JSON.stringify({username: myName, channel_name: selected, password: pwd})
        });
        const data = await res.json();
        
        if (data.status === "success") {
            myJoinedChannels.push(selected);
            currentActiveChannel = selected;
            document.getElementById("channel-title").innerText = "Chat channel: " + selected;
            fetchMessages();
        } else {
            alert(data.message);
            document.getElementById("channel-select").value = currentActiveChannel; 
        }
    }

    async function sendBroadcast() {
        const msg = document.getElementById("chat-input").value;
        if (!msg.trim()) return;

        await fetch("/api/send-broadcast", {
            method: "POST",
            body: JSON.stringify({ message: msg, channel: currentActiveChannel })
        });
        
        document.getElementById("chat-input").value = "";
        fetchMessages(); 
    }

    async function fetchMessages() {
        try {
            const res = await fetch("/get-messages");
            const data = await res.json();
            const box = document.getElementById("messages");
            
            box.innerHTML = "";
            data.messages.forEach(m => {
                if (m.channel === currentActiveChannel || m.type === "direct") {
                    box.innerHTML += `<div class="msg ${m.type}"><b>${m.sender}:</b> ${m.message}</div>`;
                }
            });
            box.scrollTop = box.scrollHeight; 
        } catch (error) {}
    }
  </script>
</body>
</html>
