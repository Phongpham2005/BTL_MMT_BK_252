# Cấu hình chuyển tiếp cơ bản (Cổng 8080 -> 9000)
host "127.0.0.1:8080" {
    proxy_pass http://127.0.0.1:9000;
}

# Cấu hình tên miền ảo (Virtual Host)
host "app1.local" {
    proxy_pass http://127.0.0.1:9001;
}

# Cấu hình cân bằng tải (Round-robin Load Balancing)
host "app2.local" {
    proxy_set_header Host $host;
    proxy_pass http://127.0.0.1:9002;
    proxy_pass http://127.0.0.1:9003;
    dist_policy round-robin
}