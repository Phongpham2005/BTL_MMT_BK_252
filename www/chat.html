<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hybrid P2P Chat System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        /* Dark Mode Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        :root {
            --bg-main: #18191a;
            --bg-sidebar: #242526;
            --bg-item: #3a3b3c;
            --border-color: #3e4042;
            --text-main: #e4e6eb;
            --text-dim: #b0b3b8;
            --accent: #2d88ff;
            --msg-own: #0084ff;
            --msg-other: #3a3b3c;
        }

        body { height: 100vh; width: 100vw; overflow: hidden; background-color: var(--bg-main); display: flex; color: var(--text-main); }

        /* UI Elements */
        .btn { background-color: var(--accent); color: white; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn:hover { background-color: #1877f2; }
        
        .input-field { padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 8px; outline: none; width: 100%; background-color: var(--bg-item); color: var(--text-main); }
        .input-field:focus { border-color: var(--accent); }

        /* Login Screen */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: var(--bg-main); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: var(--bg-sidebar); padding: 40px; border-radius: 12px; border: 1px solid var(--border-color);
            width: 400px; text-align: center;
        }

        /* Main Layout */
        #app-container { display: none; width: 100%; height: 100%; flex-direction: row; }

        /* Sidebar */
        .sidebar {
            width: 300px; min-width: 300px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column;
        }
        
        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid var(--border-color); }
        .brand-text { font-size: 22px; font-weight: 800; color: #f02849; margin-bottom: 10px; display: block; }
        
        #user-display { font-size: 18px; font-weight: 700; color: var(--text-main); display: block; }
        #status-display { color: #31a24c; font-weight: 600; font-size: 13px; }

        .sidebar-section { padding: 15px; border-bottom: 1px solid var(--border-color); }
        .section-title { font-size: 12px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; display: block; }

        .channel-list { flex: 1; overflow-y: auto; padding: 10px; }
        .channel-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; margin-bottom: 4px; border-radius: 8px;
            cursor: pointer; font-weight: 600; transition: 0.2s;
        }
        .channel-item:hover { background-color: var(--bg-item); }
        .channel-item.active { background-color: rgba(45, 136, 255, 0.1); color: var(--accent); }
        
        .unread-badge { background-color: #fa3e3e; color: white; font-size: 11px; padding: 2px 6px; border-radius: 10px; }

        /* Chat Area */
        .main-chat { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 20px 25px; border-bottom: 1px solid var(--border-color); background: var(--bg-sidebar); }
        .messages-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        
        /* Bubbles */
        .msg-wrapper { display: flex; flex-direction: column; margin-bottom: 15px; max-width: 75%; }
        .msg-others { align-self: flex-start; }
        .msg-own { align-self: flex-end; align-items: flex-end; }
        .msg-sender { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; padding: 0 8px; }
        .msg-bubble { padding: 10px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; }
        .msg-others .msg-bubble { background-color: var(--msg-other); color: var(--text-main); border-bottom-left-radius: 4px; }
        .msg-own .msg-bubble { background-color: var(--msg-own); color: #fff; border-bottom-right-radius: 4px; }

        .input-area { padding: 20px; border-top: 1px solid var(--border-color); display: flex; gap: 12px; background: var(--bg-sidebar); }
        .input-area .input-field { border-radius: 22px; background-color: var(--bg-item); border: none; padding: 12px 20px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <span class="brand-text" style="font-size: 28px; text-align: center;">bksysnet@hcmut</span>
            <h2 style="margin-bottom: 20px;">P2P Messenger</h2>
            <input type="text" id="username" class="input-field" style="margin-bottom: 15px; text-align: center;" placeholder="Choose a username...">
            <button class="btn" style="width: 100%; height: 45px;" onclick="login()">Connect to Network</button>
        </div>
    </div>

    <div id="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="brand-text">bksysnet@hcmut</span>
                <div class="user-info">
                    <span id="user-display">User</span>
                    <span id="status-display">● Online</span>
                </div>
            </div>
            
            <div class="sidebar-section">
                <span class="section-title">Create Channel</span>
                <input type="text" id="new-channel-name" class="input-field" placeholder="Name..." style="margin-bottom: 8px;">
                <input type="password" id="new-channel-pass" class="input-field" placeholder="Password (Optional)" style="margin-bottom: 8px;">
                <button class="btn" style="width: 100%; padding: 8px;" onclick="createNewChannel()">Create</button>
            </div>

            <div class="channel-list">
                <span class="section-title">Channels</span>
                <div id="channel-list-items"></div>
            </div>
        </aside>

        <main class="main-chat">
            <header class="chat-header">
                <h3 id="current-channel-name"># Global</h3>
                <small id="channel-status" style="color: var(--text-dim);">Public Room</small>
            </header>

            <div id="messages-display" class="messages-area"></div>

            <div class="input-area">
                <input type="text" id="chat-input" class="input-field" placeholder="Write a message..." onkeypress="if(event.key==='Enter') sendBroadcast()">
                <button class="btn" onclick="sendBroadcast()">Send</button>
            </div>
        </main>
        <aside class="sidebar-right" style="width: 250px; background-color: var(--bg-sidebar); border-left: 1px solid var(--border-color); padding: 15px;">
            <div class="sidebar-section">
                <span class="section-title">Members Online</span>
                <div id="online-users-list">
                    <!-- Danh sách user sẽ render ở đây -->
                </div>
            </div>
        </aside>
    </div>

    <script>
        let myName = "";
        const TRACKER_URL = "http://127.0.0.1:9000";
        let currentChannel = "Global";
        let joinedChannels = ["Global"];
        let channelData = {};
        
        let lastSeenMessageCount = { "Global": 0 };
        let unreadCounts = { "Global": 0 };

        async function login() {
            myName = document.getElementById("username").value;
            let port = window.location.port || "8001";
            if (!myName) return alert("Username required!");

            try {
                await fetch("/login", { method: "POST", body: JSON.stringify({username: myName}) });
                await fetch(`${TRACKER_URL}/submit-info`, { 
                    method: "POST", 
                    body: JSON.stringify({username: myName, ip: "127.0.0.1", port: parseInt(port)}) 
                });

                document.getElementById("login-overlay").style.display = "none";
                document.getElementById("app-container").style.display = "flex";
                document.getElementById("user-display").innerText = myName;
                document.getElementById("status-display").innerText = `● Online (Port ${port})`;

                await refreshData();
                setInterval(refreshData, 2000); 
            } catch (e) { alert("Network error: Tracker offline."); }
        }

        async function refreshData() {
            await updateChannels();
            await fetchMessages();
        }

        async function createNewChannel() {
            const name = document.getElementById("new-channel-name").value;
            const pass = document.getElementById("new-channel-pass").value;
            if(!name) return;

            const res = await fetch(`${TRACKER_URL}/add-list`, {
                method: "POST",
                body: JSON.stringify({ channel_name: name, password: pass, creator: myName })
            });
            const data = await res.json();
            if(data.status === "success") {
                joinedChannels.push(name);
                lastSeenMessageCount[name] = 0;
                unreadCounts[name] = 0;
                switchChannel(name);
            }
            document.getElementById("new-channel-name").value = "";
            document.getElementById("new-channel-pass").value = "";
        }

        async function updateChannels() {
            try {
                const res = await fetch(`${TRACKER_URL}/get-list`);
                const data = await res.json();
                
                // 1. Xử lý danh sách Channel (Nhóm chat)
                channelData = data.channels;
                const list = document.getElementById("channel-list-items");
                list.innerHTML = "";
                
                for (let ch in channelData) {
                    const div = document.createElement("div");
                    div.className = `channel-item ${ch === currentChannel ? 'active' : ''}`;
                    div.onclick = () => switchChannel(ch);
                    let label = channelData[ch].is_private ? `🔒 ${ch}` : `# ${ch}`;
                    div.innerHTML = `<span>${label}</span>`;
                    if (unreadCounts[ch] > 0) div.innerHTML += `<span class="unread-badge">${unreadCounts[ch]}</span>`;
                    list.appendChild(div);
                }

                // 2. Xử lý danh sách User Online (Thanh bên phải)
                const userList = document.getElementById("online-users-list");
                userList.innerHTML = ""; 

                // Duyệt qua data.peers trích xuất từ dữ liệu vừa lấy về
                for (let peerName in data.peers) {
                    const div = document.createElement("div");
                    div.className = "channel-item"; 
                    
                    // Nếu là chính mình thì hiện màu khác hoặc chữ (You) cho dễ phân biệt
                    let displayName = peerName === myName ? `${peerName} (You)` : peerName;
                    let color = peerName === myName ? "var(--accent)" : "#31a24c"; // Màu xanh lá cho người khác online
                    
                    div.innerHTML = `<span style="color: ${color}">●</span> <span style="margin-left: 8px">${displayName}</span>`; 
                    userList.appendChild(div);
                }

            } catch (e) {
                console.log("Error updating data from tracker:", e);
            }
        }

        async function switchChannel(name) {
            if (!joinedChannels.includes(name) && channelData[name].is_private) {
                const pwd = prompt(`Enter password for ${name}:`);
                if (pwd === null) return;
                const res = await fetch(`${TRACKER_URL}/join-channel`, {
                    method: "POST",
                    body: JSON.stringify({username: myName, channel_name: name, password: pwd})
                });
                const data = await res.json();
                if (data.status !== "success") return alert(data.message);
                joinedChannels.push(name);
            } else if (!joinedChannels.includes(name)) joinedChannels.push(name);

            currentChannel = name;
            unreadCounts[name] = 0;
            document.getElementById("current-channel-name").innerText = channelData[name].is_private ? `🔒 ${name}` : `# ${name}`;
            document.getElementById("channel-status").innerText = channelData[name].is_private ? "Private Room" : "Public Room";
            updateChannels();
            fetchMessages();
        }

        async function fetchMessages() {
            try {
                const res = await fetch("/get-messages");
                const data = await res.json();
                const box = document.getElementById("messages-display");
                const countsPerChannel = {};
                let html = "";
                
                data.messages.forEach(m => {
                    countsPerChannel[m.channel] = (countsPerChannel[m.channel] || 0) + 1;
                    if (m.channel === currentChannel || m.type === "direct") {
                        const isOwn = m.sender === myName;
                        html += `
                            <div class="msg-wrapper ${isOwn ? 'msg-own' : 'msg-others'}">
                                <span class="msg-sender">${m.sender}</span>
                                <div class="msg-bubble">${m.message}</div>
                            </div>`;
                    }
                });

                if (box.innerHTML !== html) {
                    box.innerHTML = html;
                    box.scrollTop = box.scrollHeight;
                }

                for (let ch in countsPerChannel) {
                    if (ch === currentChannel) {
                        lastSeenMessageCount[ch] = countsPerChannel[ch];
                        unreadCounts[ch] = 0;
                    } else {
                        const total = countsPerChannel[ch];
                        const lastSeen = lastSeenMessageCount[ch] || 0;
                        if (total > lastSeen) unreadCounts[ch] = total - lastSeen;
                    }
                }
            } catch (e) {}
        }

        async function sendBroadcast() {
            const input = document.getElementById("chat-input");
            const msg = input.value;
            if (!msg.trim()) return;
            await fetch("/api/send-broadcast", {
                method: "POST",
                body: JSON.stringify({ message: msg, channel: currentChannel })
            });
            input.value = "";
            fetchMessages();
        }
    </script>
</body>
</html>
