<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hybrid P2P Chat | bksysnet@hcmut</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        :root {
            --bg-main: #18191a; --bg-sidebar: #242526; --bg-item: #3a3b3c;
            --border-color: #3e4042; --text-main: #e4e6eb; --text-dim: #b0b3b8;
            --accent: #2d88ff; --danger: #f02849; --msg-own: #0084ff;
        }
        body { height: 100vh; background-color: var(--bg-main); color: var(--text-main); display: flex; overflow: hidden; }
        .brand-logo { color: var(--danger); font-weight: 800; font-size: 18px; margin-bottom: 10px; display: block; text-decoration: none; }
        
        .overlay { position: fixed; inset: 0; background: var(--bg-main); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .card { background: var(--bg-sidebar); padding: 30px; border-radius: 12px; width: 350px; border: 1px solid var(--border-color); text-align: center; }
        .input-field { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-item); color: white; outline: none; }
        .btn { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        #app-container { display: none; width: 100%; height: 100%; flex-direction: row; }
        .sidebar { width: 280px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .main-chat { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        
        .action-btn { font-size: 11px; font-weight: bold; padding: 4px 10px; border-radius: 4px; cursor: pointer; border: 1px solid transparent; }
        .btn-leave { color: var(--danger); border-color: var(--danger); }
        .btn-delete { background: var(--danger); color: white; }
    </style>
</head>
<body>

    <div id="login-view" class="overlay">
        <div class="card">
            <span class="brand-logo">bksysnet@hcmut</span>
            <h2 style="margin-bottom:20px">Login</h2>
            <input type="text" id="login-user" class="input-field" placeholder="Username">
            <input type="password" id="login-pass" class="input-field" placeholder="Password">
            <button class="btn" onclick="handleLogin()">Login</button>
            <p style="font-size:12px; margin-top:15px">No account? <span style="color:var(--accent); cursor:pointer" onclick="showRegister()">Register</span></p>
        </div>
    </div>

    <div id="register-view" class="overlay" style="display:none">
        <div class="card">
            <h2 style="margin-bottom:20px">Register</h2>
            <input type="text" id="reg-user" class="input-field" placeholder="Username">
            <input type="password" id="reg-pass" class="input-field" placeholder="Password">
            <button class="btn" onclick="handleRegister()">Create Account</button>
            <p style="font-size:12px; margin-top:15px; color:var(--accent); cursor:pointer" onclick="showLogin()">Back to Login</p>
        </div>
    </div>

    <div id="app-container">
        <aside class="sidebar">
            <div class="header">
                <div>
                    <span class="brand-logo" style="font-size:14px; margin:0">bksysnet@hcmut</span>
                    <span id="display-name" style="font-weight:bold; font-size:12px">User</span>
                </div>
                <span style="color:var(--danger); cursor:pointer; font-size:11px" onclick="handleLogout()">Logout</span>
            </div>
            <div style="padding:15px; border-bottom:1px solid var(--border-color)">
                <input type="text" id="new-ch-name" class="input-field" placeholder="Channel Name" style="margin-bottom:8px">
                <input type="password" id="new-ch-pass" class="input-field" placeholder="Password (Optional)" style="margin-bottom:8px">
                <button class="btn" onclick="createChannel()">Create Channel</button>
            </div>
            <div id="channel-list" style="overflow-y:auto; flex:1; padding:10px"></div>
        </aside>

        <main class="main-chat">
            <div class="header">
                <h3># <span id="active-ch-label">Global</span></h3>
                <div id="action-btn-container"></div>
            </div>
            <div id="msg-box" style="flex:1; overflow-y:auto; padding:20px"></div>
            <div style="padding:20px; border-top:1px solid var(--border-color); display:flex; gap:10px">
                <input type="text" id="chat-input" class="input-field" placeholder="Message..." style="margin:0">
                <button class="btn" style="width:80px" onclick="sendMessage()">Send</button>
            </div>
        </main>

        <aside style="width:220px; background:var(--bg-sidebar); border-left:1px solid var(--border-color); padding:20px">
            <p style="font-size:11px; color:var(--text-dim); margin-bottom:15px">MEMBERS</p>
            <div id="member-list"></div>
        </aside>
    </div>

    <script>
        let myName = ""; 
        let currentChannel = "Global"; 
        const TRACKER = "http://127.0.0.1:9000";
        let syncTimer = null;

        async function sync() {
            try {
                const res = await fetch(`${TRACKER}/get-list`);
                const data = await res.json();
                
                // CHECK IF CHANNEL DELETED (For Members)
                if (currentChannel !== "Global" && !data.channels[currentChannel]) {
                    alert("Channel has been deleted.");
                    currentChannel = "Global";
                    document.getElementById('active-ch-label').innerText = "Global";
                    sync(); return;
                }

                // 1. Sidebar Channels
                document.getElementById('channel-list').innerHTML = Object.keys(data.channels).map(ch => `
                    <div onclick="joinChannel('${ch}')" style="padding:10px; cursor:pointer; border-radius:5px; margin-bottom:5px; background:${ch===currentChannel?'#3a3b3c':''}">
                        # ${ch} ${data.channels[ch].is_private ? '🔒' : ''}
                    </div>
                `).join('');

                // 2. Member List with ( Creator ) tag
                const chData = data.channels[currentChannel];
                const members = chData?.members || [];
                const creator = chData?.creator || "";
                const onlinePeers = Object.keys(data.peers);
                document.getElementById('member-list').innerHTML = members.map(m => `
                    <div style="font-size:13px; margin-bottom:10px">
                        <span style="color:${onlinePeers.includes(m)?'#31a24c':'#888'}">●</span> 
                        ${m} ${m === creator ? '<span style="color:#f02849; font-size:10px; font-weight:bold"> ( Creator )</span>' : ''}
                    </div>
                `).join('');

                // 3. Action Button (Leave vs Delete)
                const container = document.getElementById('action-btn-container');
                if(currentChannel !== "Global") {
                    if (creator === myName) {
                        container.innerHTML = `<span class="action-btn btn-delete" onclick="handleDeleteChannel()">Delete Channel</span>`;
                    } else {
                        container.innerHTML = `<span class="action-btn btn-leave" onclick="handleLeaveChannel()">Leave</span>`;
                    }
                } else { container.innerHTML = ""; }

                // 4. Messages
                const mRes = await fetch("/get-messages");
                const mData = await mRes.json();
                document.getElementById('msg-box').innerHTML = mData.messages
                    .filter(m => m.channel === currentChannel)
                    .map(m => `<div style="margin-bottom:12px; text-align:${m.sender===myName?'right':'left'}">
                        <div style="background:${m.sender===myName?'#0084ff':'#3a3b3c'}; padding:8px 14px; border-radius:15px; display:inline-block; max-width:70%">${m.message}</div>
                    </div>`).join('');
            } catch (e) {}
        }

        async function handleLeaveChannel() {
            if(!confirm("Leave #" + currentChannel + "?")) return;
            await fetch(`${TRACKER}/leave-channel`, { method:"POST", body: JSON.stringify({username: myName, channel_name: currentChannel})});
            currentChannel = "Global"; sync();
        }

        async function handleDeleteChannel() {
            if(!confirm("Are you sure to DELETE #" + currentChannel + "? This will kick everyone out.")) return;
            const res = await fetch(`${TRACKER}/delete-channel`, { 
                method:"POST", body: JSON.stringify({username: myName, channel_name: currentChannel})
            });
            if((await res.json()).status === "success") {
                currentChannel = "Global"; sync();
            }
        }

        // UI NAVIGATION
        function showRegister() { document.getElementById('login-view').style.display='none'; document.getElementById('register-view').style.display='flex'; }
        function showLogin() { document.getElementById('login-view').style.display='flex'; document.getElementById('register-view').style.display='none'; }

        // AUTHENTICATION
        async function handleRegister() {
            const u = document.getElementById('reg-user').value;
            const p = document.getElementById('reg-pass').value;
            if(!u || !p) return alert("Please fill all fields.");

            const res = await fetch("/register", { 
                method: "POST", 
                headers: {"Content-Type": "application/x-www-form-urlencoded"},
                body: `username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}` 
            });
            const data = await res.json();
            if(data.status === "success") { alert("Account created! You can now login."); showLogin(); }
            else alert("Error: " + data.message);
        }

        async function handleLogin() {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            const res = await fetch("/login", { method: "POST", body: `username=${u}&password=${p}` });
            const data = await res.json();
            if(data.status === "success") {
                myName = u;
                await fetch(`${TRACKER}/submit-info`, { method:"POST", body: JSON.stringify({username:u, ip:"127.0.0.1", port:parseInt(location.port)})});
                document.getElementById('login-view').style.display='none';
                document.getElementById('app-container').style.display='flex';
                document.getElementById('display-name').innerText = u;

                sync(); 
                syncTimer = setInterval(sync, 2000);
                setInterval(sync, 2000);
            } else alert(data.message);
        }

        async function handleLogout() {
            if(!confirm("Are you sure you want to logout?")) return;
            clearInterval(syncTimer);
            try {
            await fetch(`${TRACKER}/unregister`, { 
                method: "POST", 
                body: JSON.stringify({username: myName}) 
            });
            await fetch("/logout", { method: "POST" });
            } catch(e) {
                console.error("Logout network error:", e);
            }

            myName = "";
            currentChannel = "Global";
            window.location.reload();
        }

        // AUTO LOGOUT: Detect when user closes the tab or hits F5 (Refresh)
        window.addEventListener("beforeunload", function() {
            if (myName) {
                const payload = JSON.stringify({username: myName});
                // sendBeacon silently sends a POST request before the page unloads
                navigator.sendBeacon(`${TRACKER}/unregister`, payload);
                navigator.sendBeacon("/logout", payload);
            }
        });

        // CHANNEL LOGIC
        async function createChannel() {
            const name = document.getElementById('new-ch-name').value.trim();
            const pass = document.getElementById('new-ch-pass').value;
            if(!name) return alert("Channel name required.");

            const res = await fetch(`${TRACKER}/add-list`, { 
                method: "POST", 
                body: JSON.stringify({channel_name: name, password: pass, creator: myName})
            });
            const data = await res.json();
            if(data.status === "success") {
                document.getElementById('new-ch-name').value = "";
                document.getElementById('new-ch-pass').value = "";
                joinChannel(name);
            } else alert("Error: " + data.message);
        }

        async function joinChannel(name) {
            const resList = await fetch(`${TRACKER}/get-list`);
            const dataList = await resList.json();
            const ch = dataList.channels[name];
            
            // If already a member (checked via persistence or current session), join directly
            if (ch.members.includes(myName)) {
                const res = await fetch(`${TRACKER}/join-channel`, {
                    method: "POST", 
                    body: JSON.stringify({username: myName, channel_name: name})
                });
                if((await res.json()).status === "success") {
                    currentChannel = name;
                    document.getElementById('active-ch-label').innerText = name;
                    sync();
                }
                return;
            }

            // Prompt for password if channel is private
            let pass = "";
            if(ch.is_private) {
                pass = prompt("Enter password for #" + name + ":");
                if(pass === null) return;
            }

            const res = await fetch(`${TRACKER}/join-channel`, {
                method: "POST", 
                body: JSON.stringify({username: myName, channel_name: name, password: pass})
            });
            const data = await res.json();
            if(data.status === "success") {
                currentChannel = name;
                document.getElementById('active-ch-label').innerText = name;
                sync();
            } else alert("Access Denied: " + data.message);
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if(!msg) return;
            
            await fetch("/api/send-broadcast", {
                method: "POST",
                body: JSON.stringify({message: msg, channel: currentChannel})
            });
            input.value = "";
            sync();
        }

        // Allow 'Enter' key to send messages
        document.getElementById("chat-input").addEventListener("keypress", (e) => {
            if(e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
